name: secure-ci-cd

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  secrets-scan:
    name: Gitleaks (Secrets Scan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks

      - name: Run Gitleaks (full history scan)
        run: ./gitleaks detect --source . --verbose --redact --exit-code=1
  sast-scan:
    name: Semgrep (SAST)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config=p/security-audit \
            --config=p/python \
            --config=p/flask \
            --sarif --output=semgrep-results.sarif \
            app/

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-results.sarif

      - name: Enforce fail policy (block on ERROR severity)
        run: |
          semgrep scan \
            --config=p/security-audit \
            --config=p/python \
            --config=p/flask \
            --error \
            app/
